<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company/Device Health Graph</title>
  <style>
    html, body { height: 100%; margin: 0; background: #0b0f14; color: #e6eef7; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, sans-serif; }
    .header { display:flex; justify-content:space-between; align-items:center; padding: 12px 16px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .title { font-size: 16px; font-weight: 600; }
    .meta { font-size: 12px; opacity: 0.85; }
    .actions { display:flex; gap: 8px; flex-wrap: wrap; }
    .btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); color: #e6eef7; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .btn:hover { background: rgba(255,255,255,0.10); }
    #canvas { width: 100%; height: calc(100% - 54px); display:block; }
    .status { position: fixed; left: 16px; bottom: 12px; font-size: 12px; opacity: 0.85; background: rgba(0,0,0,0.35); padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">Company/Device Health Graph</div>
      <div class="meta" id="meta">Loading…</div>
    </div>
    <div class="actions">
      <button class="btn" onclick="window.location.href='/'">Dashboard</button>
      <button class="btn" onclick="window.location.href='/topology'">Topology</button>
      <button class="btn" onclick="window.location.href='/analytics'">Analytics</button>
      <button class="btn" onclick="window.open('/api/reports/company-device-health-graph','_blank','noopener')">Open JSON</button>
      <button class="btn" onclick="window.location.reload()">Reload</button>
    </div>
  </div>

  <canvas id="canvas"></canvas>
  <div class="status" id="status">Initializing…</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="/js/reports/companyDeviceHealthGraph.js"></script>
</body>
</html>
