<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reports</title>
  <style>
    html, body { height: 100%; margin: 0; background: #0b0f14; color: #e6eef7; font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, sans-serif; }
    .header { display:flex; justify-content:space-between; align-items:center; padding: 12px 16px; background: rgba(255,255,255,0.04); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .title { font-size: 16px; font-weight: 600; }
    .meta { font-size: 12px; opacity: 0.85; }
    .actions { display:flex; gap: 8px; flex-wrap: wrap; }
    .btn { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10); color: #e6eef7; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; }
    .btn:hover { background: rgba(255,255,255,0.10); }
    .wrap { padding: 16px; max-width: 1100px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; }
    .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 12px; }
    .cardTitle { font-size: 14px; font-weight: 650; }
    .cardDesc { margin-top: 6px; font-size: 12px; opacity: 0.85; line-height: 1.35; }
    .cardBtns { display:flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .pill { display:inline-block; font-size: 11px; opacity: 0.8; padding: 4px 8px; border-radius: 999px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); }
    .status { position: fixed; left: 16px; bottom: 12px; font-size: 12px; opacity: 0.85; background: rgba(0,0,0,0.35); padding: 8px 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.08); }
    a { color: inherit; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">Reports</div>
      <div class="meta" id="meta">Loading…</div>
    </div>
    <div class="actions">
      <button class="btn" onclick="window.location.href='/'">Dashboard</button>
      <button class="btn" onclick="window.location.href='/topology'">Topology</button>
      <button class="btn" onclick="window.location.href='/analytics'">Analytics</button>
      <button class="btn" onclick="window.location.href='/legacy'">Legacy</button>
      <button class="btn" onclick="window.open('/api/reports/catalog','_blank','noopener')">Open JSON</button>
      <button class="btn" onclick="window.location.reload()">Reload</button>
    </div>
  </div>

  <div class="wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="status" id="status">Initializing…</div>

  <script src="/js/reports/catalog.js"></script>
</body>
</html>
